name: ci-test-install

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "*.md"
    branches:
      - main
    tags:
      - '*'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-installation:
    name: Install on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Test wheel installation
        shell: bash
        run: |
          python -m venv .venv-wheel
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv-wheel/Scripts/activate
          else
            source .venv-wheel/bin/activate
          fi

          pip install --upgrade pip
          pip install dist/*.whl

          mkdir -p test-import && cd test-import
          python -c "import xorq_style; print(f'Successfully imported {xorq_style.__name__}')"

      - name: Test sdist installation
        shell: bash
        run: |
          python -m venv .venv-sdist
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv-sdist/Scripts/activate
          else
            source .venv-sdist/bin/activate
          fi

          pip install --upgrade pip
          pip install dist/*.tar.gz
          python -c "import xorq_style; print(f'Successfully imported {xorq_style.__name__}')"
