name: ci-test-install

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "*.md"
    branches:
      - main
    tags:
      - '*'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-installation:
    name: Install on ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Build package
        run: uv build --python ${{ matrix.python-version }}

      - name: Test wheel installation
        shell: bash
        run: |
          uv venv .venv-wheel --python ${{ matrix.python-version }}
          uv pip install --python .venv-wheel dist/*.whl

          mkdir -p test-import && cd test-import
          uv run --python ../.venv-wheel python -c "import xorq_style; print(f'Successfully imported {xorq_style.__name__}')"

      - name: Test sdist installation
        shell: bash
        run: |
          uv venv .venv-sdist --python ${{ matrix.python-version }}
          uv pip install --python .venv-sdist dist/*.tar.gz

          uv run --python .venv-sdist python -c "import xorq_style; print(f'Successfully imported {xorq_style.__name__}')"
