name: ci-test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "*.md"
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --frozen --group dev

      - name: pytest
        timeout-minutes: 10
        run: uv run --no-sync pytest --import-mode=importlib -v --durations=20
