name: ci-test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "*.md"
    branches:
      - main
    tags:
      - '*'
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --frozen --group dev

      - name: pytest
        timeout-minutes: 10
        run: uv run --no-sync pytest --import-mode=importlib -v --durations=20

  test-min-versions:
    name: Min versions / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv

      - name: Install project with lowest direct dependency versions
        run: uv pip install -e . --resolution lowest-direct

      - name: Install dev tools
        run: uv pip install pytest

      - name: Show resolved versions
        run: uv pip list

      - name: pytest
        timeout-minutes: 10
        run: uv run --no-sync pytest --import-mode=importlib -v --durations=20
